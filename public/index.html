<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0e1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>MARK OS</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="login-card">
    <div class="login-logo">💬</div>
    <h1 class="login-title">MARK OS</h1>
    <p class="login-sub">Мессенджер нового поколения</p>
    <!-- Выбор аватара -->
    <div class="avatar-pick-wrap">
      <div id="login-avatar-preview" class="avatar-preview">?</div>
      <label for="login-avatar-input" class="avatar-pick-btn">📷 Выбрать фото</label>
      <input type="file" id="login-avatar-input" accept="image/*" style="display:none"/>
    </div>

    <div class="login-field">
      <input id="username-input" type="text" placeholder="Введите ваше имя..." maxlength="32" autocomplete="off" spellcheck="false"/>
    </div>
    <button id="login-btn"><span>Начать</span> →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="hidden">

  <!-- ЛЕВАЯ ПАНЕЛЬ -->
  <div id="left-panel">
    <div class="lp-header">
      <div class="app-logo-sm">💬</div>
      <div class="lp-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Поиск..."/>
      </div>
      <button id="theme-toggle" class="icon-btn" title="Сменить тему">☀️</button>
    </div>

    <!-- Истории -->
    <div id="stories-bar" class="stories-bar"></div>

    <!-- Кнопки создания -->
    <div class="create-btns-row">
      <button class="create-btn" onclick="GroupModal.show()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Группа
      </button>
      <button class="create-btn" id="create-channel-btn" onclick="ChannelModal.show()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Канал
      </button>
    </div>

    <div id="chat-list" class="chat-list"></div>

    <div class="lp-footer">
      <button class="lp-tab active" id="tab-chats" onclick="LP.show('chats')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Чаты</span>
      </button>
      <button class="lp-tab" id="tab-contacts" onclick="LP.show('contacts')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Друзья</span>
      </button>
      <button class="lp-tab" id="tab-profile" onclick="LP.show('profile')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Профиль</span>
      </button>
    </div>
  </div>

  <!-- ПРАВАЯ ПАНЕЛЬ -->
  <div id="right-panel">

    <div id="empty-state">
      <div style="font-size:56px;opacity:.3">💬</div>
      <h2>Выберите чат</h2>
      <p>Выберите чат слева или начните переписку</p>
    </div>

    <div id="active-chat" class="hidden">

      <!-- Хедер чата -->
      <div id="chat-header">
        <button id="back-btn" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="chat-header-avatar" class="chat-av" style="cursor:pointer" title="Мой профиль"></div>
        <div class="chat-header-info">
          <div id="chat-header-title"></div>
          <div id="chat-header-status"></div>
        </div>
        <div style="display:flex;gap:4px;align-items:center">
          <button class="icon-btn" id="group-members-btn" onclick="GroupMembers.show()" title="Участники группы" style="display:none">👥</button>
          <button class="icon-btn" id="friend-notif-btn" onclick="LP.show('contacts')" title="Запросы в друзья" style="display:none">🔔<span id="friend-notif-count" class="notif-badge">0</span></button>
          <span id="latency-display" class="latency-display good"></span>
          <button class="icon-btn" onclick="UI.showProfile()" title="Профиль">👤</button>
        </div>
      </div>

      <!-- Сообщения -->
      <div id="message-list"></div>

      <!-- Typing -->
      <div id="typing-indicator" class="hidden">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span class="typing-text"></span>
      </div>

      <!-- Channel badge -->
      <div id="channel-badge" class="channel-readonly hidden">
        🔒 Только администратор может писать в этот канал
      </div>

      <!-- Reply bar -->
      <div id="reply-bar" class="action-bar hidden">
        <span class="action-bar-icon">↩️</span>
        <div class="action-bar-content">
          <span class="action-bar-label">Ответ</span>
          <span id="reply-text" class="action-bar-text"></span>
        </div>
        <button id="reply-cancel" class="action-bar-close">✕</button>
      </div>

      <!-- Edit bar -->
      <div id="edit-bar" class="action-bar hidden">
        <span class="action-bar-icon">✏️</span>
        <div class="action-bar-content">
          <span class="action-bar-label">Редактирование</span>
          <span id="edit-text" class="action-bar-text"></span>
        </div>
        <button id="edit-cancel" class="action-bar-close">✕</button>
      </div>

      <!-- Инпут -->
      <div id="input-area">
        <div class="input-row">
          <button id="attach-btn" class="attach-btn" title="Прикрепить">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <div class="input-box">
            <textarea id="message-input" placeholder="Сообщение..." rows="1" maxlength="4096"></textarea>
          </div>
          <button id="send-btn" class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <input type="file" id="file-input" accept="image/*,video/*" style="display:none" multiple/>
      </div>

    </div>
  </div>
</div>

<!-- CONTACTS PANEL -->
<div id="contacts-panel" class="side-panel hidden">
  <div class="sp-header">
    <h2>Друзья</h2>
    <span id="online-count" class="online-badge">0</span>
  </div>

  <!-- Добавить друга по ID -->
  <div class="add-friend-wrap">
    <input id="friend-id-input" type="text" placeholder="ID друга (напр. MARK-AB3D)" maxlength="9"/>
    <button id="add-friend-btn" class="add-friend-btn">Добавить</button>
  </div>

  <!-- Входящие запросы -->
  <div id="friend-requests" class="friend-requests"></div>

  <!-- Список друзей -->
  <div class="sp-section-label">Онлайн</div>
  <div id="user-list" class="user-list"></div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-modal" class="modal-overlay hidden" onclick="if(event.target===this)UI.hideProfile()">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Мой профиль</h2>
      <button class="icon-btn" onclick="UI.hideProfile()">✕</button>
    </div>
    <div class="profile-body">
      <div class="profile-avatar-wrap">
        <div id="profile-avatar" class="profile-avatar"></div>
        <label for="profile-avatar-input" class="avatar-edit-btn" title="Сменить аватар">📷</label>
        <input type="file" id="profile-avatar-input" accept="image/*" style="display:none"/>
      </div>
      <div id="profile-name" class="profile-name"></div>
      <div id="profile-role" class="profile-role"></div>
      <div class="friend-id-display">
        Ваш ID: <span id="profile-friend-id" class="friend-id-value" title="Нажми чтобы скопировать" onclick="navigator.clipboard.writeText(this.textContent).then(()=>UI.showToast('ID скопирован','success'))"></span>
      </div>
      <div class="profile-stat-row">
        <div class="stat-box"><span id="profile-msg-count">0</span><span>сообщений</span></div>
      </div>
      <div class="profile-field">
        <label>О себе</label>
        <textarea id="profile-bio-input" placeholder="Расскажите о себе..." maxlength="120" rows="3"></textarea>
      </div>
      <button id="profile-save-btn" class="btn-primary">Сохранить</button>
    </div>
  </div>
</div>

<!-- CHANNEL CREATE MODAL -->
<div id="channel-modal" class="modal-overlay hidden" onclick="if(event.target===this)ChannelModal.hide()">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Новый канал</h2>
      <button class="icon-btn" onclick="ChannelModal.hide()">✕</button>
    </div>
    <div class="profile-body">
      <div class="profile-field">
        <label>Название канала</label>
        <input id="channel-name-input" type="text" placeholder="Например: Новости проекта..." maxlength="50" style="width:100%;background:var(--bg-input);border:1.5px solid var(--border-2);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--text);"/>
      </div>
      <div class="profile-field">
        <label>Описание (необязательно)</label>
        <textarea id="channel-desc-input" placeholder="О чём этот канал..." maxlength="200" rows="2" style="width:100%;background:var(--bg-input);border:1.5px solid var(--border-2);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text);resize:none;"></textarea>
      </div>
      <button id="channel-create-btn" class="btn-primary">Создать канал</button>
    </div>
  </div>
</div>

<!-- GROUP CREATE MODAL -->
<div id="group-modal" class="modal-overlay hidden" onclick="if(event.target===this)GroupModal.hide()">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Новая группа</h2>
      <button class="icon-btn" onclick="GroupModal.hide()">✕</button>
    </div>
    <div class="profile-body">
      <div class="profile-field">
        <label>Название группы</label>
        <input id="group-name-input" type="text" placeholder="Например: Друзья, Работа..." maxlength="50" style="width:100%;background:var(--bg-input);border:1.5px solid var(--border-2);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--text);"/>
      </div>
      <div class="profile-field">
        <label>Добавить участников</label>
        <div id="group-members-list" class="group-members-list"></div>
      </div>
      <button id="group-create-btn" class="btn-primary">Создать группу</button>
    </div>
  </div>
</div>

<!-- STORY VIEWER -->
<div id="story-viewer" class="modal-overlay hidden" onclick="if(event.target===this)StoryViewer.hide()">
  <div class="story-card">
    <div class="story-av" id="story-viewer-av"></div>
    <div class="story-author" id="story-viewer-author"></div>
    <div class="story-text" id="story-viewer-text"></div>
    <div class="story-time" id="story-viewer-time"></div>
    <button class="media-close" onclick="StoryViewer.hide()">✕</button>
  </div>
</div>

<!-- USER PROFILE VIEWER -->
<div id="user-profile-modal" class="modal-overlay hidden" onclick="if(event.target===this)UserProfile.hide()">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Профиль</h2>
      <button class="icon-btn" onclick="UserProfile.hide()">✕</button>
    </div>
    <div class="profile-body">
      <div id="up-avatar" class="profile-avatar"></div>
      <div id="up-name" class="profile-name"></div>
      <div id="up-id" class="friend-id-display">ID: <span class="friend-id-value"></span></div>
      <div id="up-role" class="profile-role"></div>
      <div id="up-bio" style="font-size:13px;color:var(--text-2);text-align:center;max-width:240px;"></div>
      <div id="up-story" class="up-story hidden"></div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button id="up-dm-btn" class="btn-primary" style="flex:1">💬 Написать</button>
        <button id="up-add-btn" class="btn-secondary" style="flex:1">➕ В друзья</button>
      </div>
    </div>
  </div>
</div>

<!-- GROUP MEMBERS MODAL -->
<div id="group-members-modal" class="modal-overlay hidden" onclick="if(event.target===this)GroupMembers.hide()">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="gm-title">Участники</h2>
      <button class="icon-btn" onclick="GroupMembers.hide()">✕</button>
    </div>
    <div id="gm-list" class="user-list" style="max-height:400px;overflow-y:auto;padding:8px"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <button class="btn-secondary" style="width:100%" onclick="GroupMembers.showAddPanel()">➕ Добавить участника</button>
    </div>
    <div id="gm-add-panel" class="hidden" style="padding:12px 16px;border-top:1px solid var(--border)">
      <div id="gm-add-list" class="user-list" style="max-height:200px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu" class="context-menu hidden"></div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script>
// Левая панель — вкладки
const LP = {
  show(tab) {
    document.querySelectorAll(".lp-tab").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + tab)?.classList.add("active");
    document.getElementById("contacts-panel")?.classList.add("hidden");
    if (tab === "contacts") document.getElementById("contacts-panel")?.classList.remove("hidden");
    if (tab === "profile")  UI.showProfile();
  }
};
</script>

<script>
// Менеджер создания групп
const GroupModal = {
  selectedMembers: new Set(),
  show() {
    document.getElementById("group-modal").classList.remove("hidden");
    const list = document.getElementById("group-members-list");
    list.innerHTML = "";
    this.selectedMembers.clear();
    const users = State.getState("users");
    const me    = State.getState("currentUser");
    users.forEach(user => {
      if (me && user.id === me.id) return;
      const el = document.createElement("div");
      el.className = "group-member-item";
      el.dataset.uid = user.id;
      const av = user.avatarUrl
        ? `<img src="${user.avatarUrl}" class="user-av" style="object-fit:cover"/>`
        : `<div class="user-av" style="background:${_strColor(user.username)}">${user.avatar}</div>`;
      el.innerHTML = `${av}<span>${user.username}</span><span class="member-check">☐</span>`;
      el.addEventListener("click", () => {
        if (this.selectedMembers.has(user.id)) {
          this.selectedMembers.delete(user.id);
          el.classList.remove("selected");
          el.querySelector(".member-check").textContent = "☐";
        } else {
          this.selectedMembers.add(user.id);
          el.classList.add("selected");
          el.querySelector(".member-check").textContent = "☑";
        }
      });
      list.appendChild(el);
    });
    document.getElementById("group-create-btn").onclick = () => this.create();
  },
  hide() { document.getElementById("group-modal").classList.add("hidden"); },
  create() {
    const name = document.getElementById("group-name-input").value.trim();
    if (name.length < 2) { UI.showToast("Введите название группы", "error"); return; }
    SocketEngine.createGroup(name, Array.from(this.selectedMembers));
    this.hide();
  }
};

// Просмотр историй
const StoryViewer = {
  show(user) {
    if (!user.story) return;
    document.getElementById("story-viewer").classList.remove("hidden");
    const av = document.getElementById("story-viewer-av");
    if (user.avatarUrl) {
      av.innerHTML = `<img src="${user.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    } else {
      av.textContent = user.avatar;
      av.style.background = _strColor(user.username);
    }
    document.getElementById("story-viewer-author").textContent = user.username;
    document.getElementById("story-viewer-text").textContent   = user.story.text;
    const mins = Math.floor((Date.now() - user.story.ts) / 60000);
    document.getElementById("story-viewer-time").textContent   = mins < 60 ? `${mins} мин. назад` : `${Math.floor(mins/60)} ч. назад`;
  },
  hide() { document.getElementById("story-viewer").classList.add("hidden"); }
};

// Просмотр профиля пользователя
const UserProfile = {
  _user: null,
  show(user) {
    this._user = user;
    const modal = document.getElementById("user-profile-modal");
    modal.classList.remove("hidden");
    const av = document.getElementById("up-avatar");
    if (user.avatarUrl) {
      av.innerHTML = `<img src="${user.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
      av.style.background = "transparent";
    } else {
      av.innerHTML = user.avatar;
      av.style.background = _strColor(user.username);
    }
    document.getElementById("up-name").textContent   = user.username;
    document.getElementById("up-id").querySelector(".friend-id-value").textContent = user.friendId || "—";
    document.getElementById("up-role").textContent   = user.isAdmin ? "👑 Администратор" : "👤 Участник";
    document.getElementById("up-bio").textContent    = user.bio || "";
    const storyEl = document.getElementById("up-story");
    if (user.story) {
      storyEl.textContent = "📖 " + user.story.text;
      storyEl.classList.remove("hidden");
    } else {
      storyEl.classList.add("hidden");
    }
    document.getElementById("up-dm-btn").onclick = () => {
      SocketEngine.openDM(user.id);
      UserProfile.hide();
    };
    document.getElementById("up-add-btn").onclick = () => {
      if (user.friendId) SocketEngine.addFriend(user.friendId);
      UserProfile.hide();
    };
  },
  hide() { document.getElementById("user-profile-modal").classList.add("hidden"); }
};

// Управление участниками группы
const GroupMembers = {
  _groupId: null,
  show() {
    const roomId = State.getState("activeRoomId");
    const room   = State.getState("rooms").get(roomId);
    if (!room || room.type !== "group") return;
    this._groupId = roomId;
    document.getElementById("group-members-modal").classList.remove("hidden");
    document.getElementById("gm-title").textContent = `👥 ${room.name}`;
    SocketEngine.getGroupMembers(roomId);
  },
  hide() { document.getElementById("group-members-modal").classList.add("hidden"); },
  render(members) {
    const list = document.getElementById("gm-list");
    const me   = State.getState("currentUser");
    const room = State.getState("rooms").get(this._groupId);
    const isCreator = me && room && room.creatorId === me.id;
    list.innerHTML = "";
    members.forEach(u => {
      const isMe = me && u.id === me.id;
      const el   = document.createElement("div");
      el.className = "user-item";
      const av = u.avatarUrl
        ? `<img src="${u.avatarUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:50%;flex-shrink:0"/>`
        : `<div class="user-av" style="background:${_strColor(u.username)}">${u.avatar}</div>`;
      el.innerHTML = `
        ${av}
        <div class="user-info" style="cursor:pointer" onclick="UserProfile.show(${JSON.stringify(u).replace(/"/g,'&quot;')})">
          <div class="user-name">${u.username}${isMe ? " (ты)" : ""}</div>
          ${u.isAdmin ? '<div class="admin-tag">ADMIN</div>' : ""}
        </div>
        ${isCreator && !isMe ? `<button class="decline-btn" onclick="GroupMembers.kick('${u.id}')" title="Удалить">✕</button>` : ""}
      `;
      list.appendChild(el);
    });
  },
  kick(userId) {
    if (!confirm("Удалить участника из группы?")) return;
    SocketEngine.kickFromGroup(this._groupId, userId);
  },
  showAddPanel() {
    const panel = document.getElementById("gm-add-panel");
    panel.classList.toggle("hidden");
    const addList = document.getElementById("gm-add-list");
    addList.innerHTML = "";
    const users = State.getState("users");
    const me    = State.getState("currentUser");
    users.forEach(u => {
      if (me && u.id === me.id) return;
      const el = document.createElement("div");
      el.className = "user-item";
      el.style.cursor = "pointer";
      const av = u.avatarUrl
        ? `<img src="${u.avatarUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:50%;flex-shrink:0"/>`
        : `<div class="user-av" style="background:${_strColor(u.username)}">${u.avatar}</div>`;
      el.innerHTML = `${av}<div class="user-info"><div class="user-name">${u.username}</div></div><span style="color:var(--accent-h)">+ Добавить</span>`;
      el.addEventListener("click", () => {
        SocketEngine.addToGroup(this._groupId, u.id);
        el.style.opacity = "0.4";
        el.style.pointerEvents = "none";
      });
      addList.appendChild(el);
    });
  }
};

const AuthScreen = {
  show(screen) {
    document.getElementById("auth-choice").classList.add("hidden");
    document.getElementById("auth-register").classList.add("hidden");
    document.getElementById("auth-login").classList.add("hidden");
    if (screen === "choice") {
      document.getElementById("auth-choice").classList.remove("hidden");
    } else if (screen === "register") {
      document.getElementById("auth-register").classList.remove("hidden");
      document.getElementById("reg-username")?.focus();
    } else if (screen === "login") {
      document.getElementById("auth-login").classList.remove("hidden");
      document.getElementById("login-friend-id")?.focus();
    }
  }
};

// Авто-формат MARK-ID при вводе
document.getElementById("login-friend-id")?.addEventListener("input", function() {
  let v = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, "");
  if (v.length > 4 && !v.startsWith("MARK-")) v = "MARK-" + v.replace("MARK", "");
  this.value = v;
});

const ChannelModal = {
  show() {
    const me = State.getState("currentUser");
    if (!me || !me.isAdmin) { UI.showToast("Только администратор может создавать каналы", "error"); return; }
    document.getElementById("channel-modal").classList.remove("hidden");
    document.getElementById("channel-create-btn").onclick = () => this.create();
  },
  hide() { document.getElementById("channel-modal").classList.add("hidden"); },
  create() {
    const name = document.getElementById("channel-name-input").value.trim();
    const desc = document.getElementById("channel-desc-input").value.trim();
    if (name.length < 2) { UI.showToast("Введите название канала", "error"); return; }
    SocketEngine.createChannel(name, desc);
    this.hide();
  }
};

function _strColor(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return `hsl(${Math.abs(h) % 360},55%,42%)`;
}
